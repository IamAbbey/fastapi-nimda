{% extends 'base.html' %}


{% block content %}
<div class="flex flex-col gap-4">
    <p class="text-xl">Site Administation</p>

<ul class="max-w-3xl text-sm font-medium">
    {% for resource in resources %}
        <li class="w-full px-4 py-2 {% if loop.first %} border-y {% else %} border-b {% endif %} border-gray-200 dark:border-gray-600">
            <div class="flex justify-between">
                <a href="{{ url_for('admin_list', identity=resource.identity) }}">{{ resource.table_name }}</a>
                <div class="flex gap-6">
                    <a href="{{ url_for('admin_add', identity=resource.identity) }}" class="flex items-center gap-1">
                        {% include "/component/plus_svg.html" %} Add
                    </a>
                    <a href="{{ url_for('admin_add', identity=resource.identity) }}" class="flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil-icon lucide-pencil"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>Change
                    </a>
                </div>
            </div>
        </li>
    {% endfor %}
</ul>
</div>

    
{% endblock content %}
